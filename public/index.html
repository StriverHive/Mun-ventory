<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mun-ventory</title>
  <meta name="description" content="Stock, menu & product mix manager">
  <meta name="theme-color" content="#ec4899">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mun-ventory">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- PIN lock screen -->
  <div id="login-screen" class="hidden">
    <div class="login-top">
      <img class="login-banner" src="/icons/full-logo.png" alt="Munchies Inventory">
      <p class="login-sub">Enter your 4-digit PIN</p>
      <div id="pin-dots" class="pin-dots"></div>
      <p id="login-error" class="login-error"></p>
    </div>
    <div class="login-bottom">
      <div class="keypad">
        <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
        <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
        <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
        <button class="keypad-blank" disabled></button>
        <button data-key="0">0</button>
        <button class="keypad-back" data-key="back" aria-label="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6H10.5a2 2 0 0 0-1.5.7l-4.2 4.6a1 1 0 0 0 0 1.4L9 17.3a2 2 0 0 0 1.5.7H20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2Z"/><path d="m17 9-5 5M12 9l5 5"/></svg>
        </button>
      </div>
      <button id="unlock-btn" class="btn btn-primary btn-block">Unlock</button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header id="topbar">
      <div class="brand"><img class="brand-logo-full" src="/icons/full-logo.png" alt="Mun-ventory"></div>
      <div class="topbar-actions">
        <button id="install-btn" class="icon-btn hidden" title="Install app" aria-label="Install app">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        </button>
        <button id="report-btn" class="icon-btn" title="Report" aria-label="Report">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h4"/></svg>
        </button>
        <button id="logout-btn" class="icon-btn" title="Lock" aria-label="Lock">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        </button>
      </div>
    </header>

    <main id="view"></main>

    <nav id="tabbar">
      <button class="tab" data-tab="mix">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4h6a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z"/><path d="M8 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><path d="M9 12h6M9 16h4"/></svg>
        <span>Product Mix</span>
      </button>
      <button class="tab" data-tab="stock">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5V8Z"/><path d="m3 8 9 5 9-5M12 13v8"/></svg>
        <span>Stock</span>
      </button>
      <button class="tab" data-tab="menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.5C10.5 5 8.5 4.5 4 4.5v13c4.5 0 6.5.5 8 2 1.5-1.5 3.5-2 8-2v-13c-4.5 0-6.5.5-8 2Z"/><path d="M12 6.5v13"/></svg>
        <span>Menu</span>
      </button>
    </nav>
  </div>

  <!-- Bottom sheet -->
  <div id="backdrop" class="hidden"></div>
  <div id="sheet" class="hidden" role="dialog" aria-modal="true"></div>

  <!-- Centered confirm dialog -->
  <div id="dialog-backdrop" class="hidden"></div>
  <div id="dialog" class="hidden" role="dialog" aria-modal="true"></div>

  <div id="toast" class="hidden"></div>

  <!-- Off-screen stage for recipe card image -->
  <div id="card-stage" aria-hidden="true"></div>

  <script src="/vendor/xlsx.full.min.js"></script>
  <script src="/vendor/html2canvas.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
