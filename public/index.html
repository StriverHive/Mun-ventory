<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mun-ventory</title>
  <meta name="description" content="Stock, menu & product mix manager">
  <meta name="theme-color" content="#ef1980">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Mun-ventory">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- PIN lock screen -->
  <div id="login-screen" class="hidden">
    <div class="login-card">
      <img class="login-banner" src="/icons/full-logo.png" alt="Munchies Inventory">
      <p class="login-sub">Enter PIN to unlock</p>
      <div id="pin-dots" class="pin-dots"></div>
      <p id="login-error" class="login-error"></p>
      <div class="keypad">
        <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
        <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
        <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
        <button class="keypad-blank" disabled></button><button data-key="0">0</button>
        <button data-key="back" aria-label="Delete">⌫</button>
      </div>
      <button id="unlock-btn" class="btn btn-primary btn-block">Unlock</button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header id="topbar">
      <div class="brand"><img class="brand-logo" src="/icons/icon-192.png" alt=""> Mun-ventory</div>
      <div class="topbar-actions">
        <button id="install-btn" class="icon-btn hidden" title="Install app" aria-label="Install app">↓</button>
        <button id="report-btn" class="icon-btn" title="Report" aria-label="Report">📊</button>
        <button id="logout-btn" class="icon-btn" title="Lock" aria-label="Lock">🔒</button>
      </div>
    </header>

    <main id="view"></main>

    <nav id="tabbar">
      <button class="tab" data-tab="mix">
        <svg viewBox="0 0 24 24"><path d="M12 3l9 4.5v9L12 21l-9-4.5v-9L12 3zm0 2.2L5.5 8.4 12 11.6l6.5-3.2L12 5.2zM5 10.1v5.2l6 3v-5.2l-6-3zm14 0l-6 3v5.2l6-3v-5.2z"/></svg>
        <span>Product Mix</span>
      </button>
      <button class="tab" data-tab="stock">
        <svg viewBox="0 0 24 24"><path d="M4 4h16a1 1 0 011 1v3H3V5a1 1 0 011-1zm-1 6h18v9a1 1 0 01-1 1H4a1 1 0 01-1-1v-9zm6 3v2h6v-2H9z"/></svg>
        <span>Stock</span>
      </button>
      <button class="tab" data-tab="menu">
        <svg viewBox="0 0 24 24"><path d="M8.1 13.34L10.93 10.5 4.62 4.19a4.5 4.5 0 000 6.36l3.48 2.79zm6.53-1.8l4.6-4.6a1 1 0 00-1.42-1.41l-3.53 3.53-.7-.7 3.53-3.54A1 1 0 0015.7 3.4l-4.6 4.6a2.5 2.5 0 000 3.54l.7.7-8.4 8.4a1 1 0 101.4 1.42l8.4-8.4.72.7a2.5 2.5 0 003.53 0l-.7-.71 4.16 4.16a1 1 0 001.41-1.41l-4.86-4.87-2.83 2.01z"/></svg>
        <span>Menu</span>
      </button>
    </nav>
  </div>

  <!-- Bottom sheet -->
  <div id="backdrop" class="hidden"></div>
  <div id="sheet" class="hidden" role="dialog" aria-modal="true"></div>

  <div id="toast" class="hidden"></div>

  <!-- Off-screen stage for recipe card image -->
  <div id="card-stage" aria-hidden="true"></div>

  <script src="/vendor/xlsx.full.min.js"></script>
  <script src="/vendor/html2canvas.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
